<style>
  :root{
    --red-1:#B64A32; --red-2:#9B3A23; --red-ink:#6E2614;
    --cream:#FBEFE8; --cream-2:#F5E3D7; --paper:#FFF8F3;
    --ink:#2B2018; --ink-2:#4A3B30; --ink-3:#6D5A4B; --mute:#9A8879;
    --rule:#E8D8C8; --rule-strong:#C9B49E;
    --gold:#C79550; --gold-soft:#EFD9AC;
    --serif:"Noto Serif TC","Songti TC",serif;
    --sans:"Noto Sans TC","PingFang TC",system-ui,sans-serif;
    --mono:"Inter",ui-monospace,system-ui,sans-serif;

  *{box-sizing:border-box} html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:17px;line-height:1.9}
  a{color:inherit;text-decoration:none}
  .topbar{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--rule)}
  .topbar-inner{max-width:1080px;margin:0 auto;padding:10px 28px;display:flex;align-items:center;gap:20px}
  .brandmark{display:flex;align-items:center;gap:10px}
  .brandmark img{height:30px;width:auto}
  .brandmark .wordmark{font-family:var(--serif);font-weight:600;font-size:15px;letter-spacing:.14em;color:var(--red-ink)}
  .topnav{margin-left:auto;display:flex;gap:22px}
  .topnav a{font-size:13.5px;color:var(--ink-2);padding:2px 0;border-bottom:1px solid transparent}
  .topnav a:hover,.topnav a.current{color:var(--red-ink);border-bottom-color:var(--red-ink)}
  .page-head{background:var(--red-2);color:#fff;padding:80px 28px 70px;position:relative;text-align:center}
  .page-head::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:40px;background:var(--cream);clip-path:polygon(0 100%,100% 100%,100% 60%,0 0)}
  .page-head .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.32em;color:var(--gold-soft);text-transform:uppercase;margin-bottom:20px}
  .page-head h1{font-family:var(--serif);font-size:44px;font-weight:700;letter-spacing:.18em;margin:0 0 16px}
  .page-head .sub{font-family:var(--serif);font-size:17px;color:rgba(255,255,255,.75);letter-spacing:.14em;margin:0}
  .rule-gold{display:block;width:64px;height:2px;background:var(--gold);margin:28px auto 0;opacity:.85}
  .wrap{max-width:1080px;margin:0 auto;padding:80px 28px 60px}
  .placeholder{padding:60px 32px;background:var(--paper);border:1px dashed var(--rule-strong);border-radius:4px;text-align:center}
  .placeholder h2{font-family:var(--serif);font-weight:700;font-size:26px;letter-spacing:.12em;color:var(--red-ink);margin:0 0 16px}
  .placeholder p{font-family:var(--serif);font-size:17px;color:var(--ink-2);line-height:2;margin:0 0 14px}
  .placeholder .tag{display:inline-block;font-family:var(--mono);font-size:11px;letter-spacing:.26em;color:var(--mute);text-transform:uppercase;margin-bottom:20px;padding:4px 12px;border:1px solid var(--rule-strong);border-radius:2px}
  .back{margin-top:40px;display:inline-block;font-family:var(--sans);font-size:13.5px;font-weight:600;letter-spacing:.22em;color:var(--red-ink);padding:12px 22px;border:1.5px solid var(--red-ink);border-radius:2px;transition:background .25s,color .25s}
  .back:hover{background:var(--red-ink);color:#fff}
  footer{margin-top:80px;border-top:1px solid var(--rule);padding:36px 28px;background:var(--cream-2)}
  .foot-inner{max-width:1080px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;font-size:13px;color:var(--ink-3)}
